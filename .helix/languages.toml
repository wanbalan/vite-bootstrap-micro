[language-server.lsp-ai]
command = "lsp-ai"

[language-server.lsp-ai.config.memory]
file_store = { }

[language-server.lsp-ai.config.models.model1]
type = "open_ai"
# type = "ollama"
chat_endpoint = "https://ai.wormsoft.ru/api/gpt/chat/completions"
# completions_endpoint = "https://ai.wormsoft.ru/api/gpt/chat/completions"
# # model =  "qwen/qwen3.5-plus"
model =  "qwen/qwen3.5-35b"
# # model =  "qwen3:0.6b"
# # n_ctx = 2048
# model =  "qwen2.5-coder-7b-instruct-q4_k_m:latest"
# # model =  "openai/gpt-5.4-mini"
# # model =  "openai/gpt-5.2"
auth_token_env_var_name = "OPENAI_API_KEY"

[[language-server.lsp-ai.config.chat]]
trigger = "#C"
action_display_name = "Chat"
model = "model1"

[language-server.lsp-ai.config.chat.parameters]
max_context = 4096
max_tokens = 1024

[[language-server.lsp-ai.config.chat.parameters.messages]]
role="system"
content = "You are a chatbot Python coding assistant. The user will ask you for assistance coding and you will do you best to answer succinctly and accurately."
# system = "You are a chatbot Rust coding assistant. The user will ask you for assistance coding and you will do you best to answer succinctly and accurately."

[[language-server.lsp-ai.config.chat]]
trigger = "#CC"
action_display_name = "Chat with context"
model = "model1"

[language-server.lsp-ai.config.chat.parameters]
max_context = 4096
max_tokens = 1024

[[language-server.lsp-ai.config.chat.parameters.messages]]
role="system"
# content= "You are a chatbot Python coding assistant. The user will ask you for assistance coding and you will do you best to answer succinctly "
system = "You are a chatbot Python coding assistant. The user will ask you for assistance coding and you will do you best to answer succinctly and accurately given the code context:\n\n{CONTEXT}"
      

