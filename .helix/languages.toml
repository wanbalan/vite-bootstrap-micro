[language-server.hx-lsp]
command = "hx-lsp"

[language-server.pylsp]
command = "pylsp"

[language-server.emmet-ls]
args = ["--stdio"]
command="emmet-ls"

[language-server.volar-vls]
command="/home/m9y/.yarn/bin/vls"
args = ["--stdio"]

[[language]]
name = "python"
language-servers = [ "hx-lsp", "pylsp", "lsp-ai" ]
auto-format = true

[[language]]
name = "markdown"
language-servers = [ "hx-lsp", "lsp-ai"]

[[language]]
name = "bash"
language-servers = [ "hx-lsp", "bash-language-server"]

[language-server.rust-analyzer.config.check]
command = "clippy"

[[language]]
name = "rust"
language-servers = [  "hx-lsp", "rust-analyzer", "lsp-ai" ]
workspace-lsp-roots = ["fuzz"]
scope = "source.rust"
file-types = ["rs"]
roots = ["Cargo.toml", "Cargo.lock"]
auto-format = true

[[language]]
name = "git-commit"
language-servers = [ "hx-lsp" ]

[[language]]
name = "javascript"
file-types = ["js", "ts"]
language-servers = [ "hx-lsp", "typescript-language-server", "typescript" ]


[[language]]
name = "css"
language-servers = [ "hx-lsp" ]

[[language]]
name = "vue"
auto-format = true
formatter = { command = "prettier", args = ["--parser", "vue"] }
language-servers = ["typescript-language-server", "hx-lsp", "emmet-ls" ]

[[language-server.typescript-language-server.config.plugins]]
name = "@vue/typescript-plugin"
location = "/home/lion/.nvm/versions/node/v24.7.0/lib/node_modules/@vue/typescript-plugin"
# location = "/home/mo/.config/nvm/versions/node/v22.20.0/lib/node_modules/@vue/language-server"
languages = ["vue"]

[[language]]
name = "html"
language-servers = [ "hx-lsp", "emmet-ls" ]
scope = "text.html.basic"
injection-regex = "html"
file-types = ["html", "htm", "shtml", "xhtml", "xht", "jsp", "asp", "aspx", "jshtm", "volt", "rhtml", "cshtml"]
block-comment-tokens = { start = "<!--", end = "-->" }
auto-format = true
indent = { tab-width = 2, unit = "  " }

[language.auto-pairs]
'{' = '}'
'[' = ']'
'"' = '"'
'`' = '`'
'<' = '>'

