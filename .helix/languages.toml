# [language-server.pylsp.config]
# formatter=false

[language-server.scls.config]
max_completion_items = 20            # set max completion results len for each group: words, snippets, unicode-input
snippets_first = true                # completions will return before snippets by default
snippets_inline_by_word_tail = false # suggest snippets by WORD tail, for example text `xsq|` become `x^2|` when snippet `sq` has body `^2`
feature_words = true                 # enable completion by word
feature_snippets = true              # enable snippets
feature_unicode_input = true         # enable "unicode input"
feature_paths = true                 # enable path completion
feature_citations = false            # enable citation completion (only on `citation` feature enabled)

[[language]]
name = "python"
# language-servers = [ "scls", "lsp-ai" ]
# language-servers = [ "scls", "pylsp"]
language-servers = [ "hx-lsp", "pylsp", "lsp-ai" ]
# auto-format = false

[[language]]
name = "markdown"
language-servers = [ "hx-lsp"]

[language-server.scls.environment]
RUST_LOG = "info,simple-completion-language-server=info"
LOG_FILE = "/tmp/completion.log"

# [language.debugger]
# name = "debugpy"
# transport = "stdio"
# command = "python3"
# args = ["-m", "debugpy.adapter"]

[[language]]
name = "bash"
language-servers = [ "hx-lsp", "bash-language-server"]

[language-server.rust-analyzer.config.check]
command = "clippy"

[[language]]
name = "rust"
language-servers = [  "hx-lsp", "rust-analyzer" ]
workspace-lsp-roots = ["fuzz"]
scope = "source.rust"
file-types = ["rs"]
roots = ["Cargo.toml", "Cargo.lock"]
auto-format = true

[[language]]
name = "git-commit"
language-servers = [ "hx-lsp" ]

[[language]]
name = "javascript"
file-types = ["js", "ts"]
language-servers = [ "hx-lsp", "typescript-language-server", "typescript" ]


[[language]]
name = "css"
language-servers = [ "hx-lsp" ]

[[language]]
name = "vue"
auto-format = true
formatter = { command = "prettier", args = ["--parser", "vue"] }
language-servers = ["typescript-language-server", "hx-lsp", "emmet-ls" ]

[[language-server.typescript-language-server.config.plugins]]
name = "@vue/typescript-plugin"
# location = "/home/lion/.nvm/versions/node/v24.7.0/lib/node_modules/@vue/typescript-plugin"
location = "/home/mo/.config/nvm/versions/node/v22.20.0/lib/node_modules/@vue/language-server"
languages = ["vue"]

